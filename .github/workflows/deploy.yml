# Deploy the Vite + React build to GitHub Pages on every push to main.
# Pairs with the `make deploy-init` one-shot in the Makefile, which
# sets the repo's Pages source to "GitHub Actions" so this workflow
# can publish.
#
# Why a workflow vs serve-from-/docs:
#   - dist/ is a build artifact; committing it pollutes diff history.
#   - GH Pages with `build_type=workflow` deploys the workflow's
#     uploaded artifact directly — no extra commits, no gh-pages
#     branch to maintain.

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
