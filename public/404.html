<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Tessera Notebook</title>
    <script type="text/javascript">
      // GH Pages SPA-fallback encode. GitHub Pages serves this file
      // when a deep URL (e.g. /season-1/two-regions-by-friday) doesn't
      // match a real file. We re-encode the path as a query string and
      // bounce back to / where index.html decodes it and the SPA router
      // takes over. Pairs with the decoder in index.html. See:
      // https://github.com/rafrex/spa-github-pages
      var pathSegmentsToKeep = 0;
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?/" +
          l.pathname
            .slice(1)
            .split("/")
            .slice(pathSegmentsToKeep)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
