<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>The Tessera Notebook</title>
    <meta name="description" content="A daily platform-engineering story. One episode a day, roughly seven minutes." />
    <link rel="alternate" type="application/rss+xml" title="The Tessera Notebook" href="/feed.xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Non-blocking font load. preload + onload-swap pattern: browser fetches the
         Google Fonts stylesheet at high priority but doesn't block render on it.
         font-display: swap (in the URL) gives FOUT instead of FOIT during the
         fetch window. <noscript> fallback for clients without JS. Full
         self-hosting of variable woff2 files is the next perf step but lands in
         a follow-up that ships the binary assets. -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,ital,wght@8..60,0,400;8..60,0,500;8..60,0,600;8..60,0,700;8..60,1,400;8..60,1,500&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,ital,wght@8..60,0,400;8..60,0,500;8..60,0,600;8..60,0,700;8..60,1,400;8..60,1,500&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
      />
    </noscript>
    <script type="text/javascript">
      // Theme: read saved preference and apply BEFORE the bundled CSS
      // paints to avoid flash-of-wrong-theme. Editorial sites default
      // to light; only an explicit reader choice switches to dark. OS
      // preference is intentionally not honored — see useTheme.ts.
      (function () {
        try {
          var raw = localStorage.getItem("tessera:theme:v1");
          var t = raw ? JSON.parse(raw) : "light";
          if (t !== "light" && t !== "dark") t = "light";
          document.documentElement.setAttribute("data-theme", t);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();

      // GH Pages SPA-fallback decode. When 404.html redirects an
      // unknown deep URL to "/?/season-1/two-regions-by-friday", this
      // snippet rewrites the URL back to the real path before the
      // React router boots. Pairs with public/404.html. See:
      // https://github.com/rafrex/spa-github-pages
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(
            null,
            "",
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      })(window.location);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
